name: Build Docker Image And Push To TCR

on:
  push:
    tags:
      # 匹配语义化版本标签，如 v1.0.0, v1.2.3-beta.1
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  # 允许手动触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v1.0.0)'
        required: true
        type: string

env:
  REGISTRY: ccr.ccs.tencentyun.com
  IMAGE_NAME: cmrhyq/chartmuseum-manager

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      # 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 安装依赖
      - name: Install dependencies
        run: npm ci

      # 运行 ESLint 检查
      - name: Run ESLint
        run: npm run lint

      # 构建前端项目
      - name: Build project
        run: npm run build

      # 获取版本信息
      - name: Get version info
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          # 移除 'v' 前缀用于 Docker 标签
          VERSION_NO_V=${VERSION#v}
          SHORT_SHA=$(git rev-parse --short HEAD)
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_NO_V=$VERSION_NO_V" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          
          echo "📦 Version: $VERSION"
          echo "🔖 Version (no v): $VERSION_NO_V"
          echo "📝 Commit: $SHORT_SHA"

      # 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录腾讯云 TCR
      - name: Login to Tencent Cloud TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          password: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}

      # 提取 Docker 元数据
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 版本标签 (v1.0.0)
            type=raw,value=${{ steps.version.outputs.VERSION }}
            # 不带 v 的版本标签 (1.0.0)
            type=raw,value=${{ steps.version.outputs.VERSION_NO_V }}
            # latest 标签 (仅非预发布版本)
            type=raw,value=latest,enable=${{ !contains(steps.version.outputs.VERSION, '-') }}
            # commit hash 标签
            type=raw,value=sha-${{ steps.version.outputs.SHORT_SHA }}

      # 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ steps.version.outputs.BUILD_DATE }}
            VERSION=${{ steps.version.outputs.VERSION }}
            COMMIT_SHA=${{ steps.version.outputs.SHORT_SHA }}

      # 输出构建摘要
      - name: Build Summary
        run: |
          echo "## 🚀 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 镜像信息" >> $GITHUB_STEP_SUMMARY
          echo "| 属性 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | \`${{ steps.version.outputs.VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ steps.version.outputs.SHORT_SHA }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 构建时间 | \`${{ steps.version.outputs.BUILD_DATE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 推送的标签" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
