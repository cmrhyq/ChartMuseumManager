apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chart-museum-manager-ingress
  labels:
    app: chart-museum-manager
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # 建议在生产环境开启 HTTPS 并启用 301 跳转
    # 如已在上游（如 ALB / 网关）终止 TLS，可按需调整为 "false"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /chartmuseum/manager
            pathType: Prefix
            backend:
              service:
                name: chart-museum-manager-service
                port:
                  name: http
  # 如在 Ingress Controller 中终止 TLS，请在此处配置证书 Secret，并将上方 host 替换为实际域名
  # tls:
  #   - hosts:
  #       - chartmuseum-manager.example.com
  #     secretName: chartmuseum-manager-tls
