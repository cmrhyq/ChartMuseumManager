apiVersion: apps/v1
kind: Deployment
metadata:
  name: chart-museum-manager
  labels:
    app: chart-museum-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chart-museum-manager
  # 滚动更新策略，降低发布对线上流量的影响
  # 如需一次性替换，可在环境覆盖中调整为 Recreate
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: chart-museum-manager
    spec:
      imagePullSecrets:
        - name: tencent-ccr-secret
      containers:
        - name: chart-museum-manager
          # 基础镜像名称由 kustomization.yaml 中的 images 段统一管理
          # 默认写成逻辑名称，具体 registry 与 tag 通过 Kustomize 覆盖，便于在不同环境复用
          image: chart-museum-manager
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: VITE_CHARTMUSEUM_API
              valueFrom:
                configMapKeyRef:
                  name: chart-museum-manager-config
                  key: VITE_CHARTMUSEUM_API
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
