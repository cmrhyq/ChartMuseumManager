apiVersion: apps/v1
kind: Deployment
metadata:
  name: chartmuseum-manager
  labels:
    app: chartmuseum-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chartmuseum-manager
  template:
    metadata:
      labels:
        app: chartmuseum-manager
    spec:
      containers:
        - name: chartmuseum-manager
          image: chartmuseum-manager:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
