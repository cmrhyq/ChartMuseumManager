apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

commonLabels:
  app: chart-museum-manager
  version: v1.0.0

# 可在此设置命名空间
namespace: production

# 可在此设置镜像
images:
  - name: chart-museum-manager
    newName: ccr.ccs.tencentyun.com/cmrhyq/dev
    newTag: chartMuseumManager-latest
